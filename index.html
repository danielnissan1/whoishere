<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מתי עובדים מהבית?</title>
    <style>
        :root {
            --primary-color: #2d5a27;
            --primary-hover: #1e3d1a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 6px;
            font-size: 2rem;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
            text-align: center;
        }

        /* גריד דינמי לכרטיסיות */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* עיצוב כרטיסיית עובד */
        .user-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .user-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
        }

        /* קבוצת כפתורי הימים */
        .days-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* כפתור יום מוסתר (הסוואת הצ'קבוקס הדיפולטיבי) */
        .day-label {
            cursor: pointer;
            flex: 1;
            min-width: 65px;
            text-align: center;
        }

        .day-label input {
            display: none; /* מחביא את הריבוע המקורי */
        }

        /* עיצוב הכפתור הויזואלי */
        .day-pill {
            display: block;
            padding: 8px 10px;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            user-select: none;
        }

        /* מה קורה כשהצ'קבוקס מסומן (האינטראקציה) */
        .day-label input:checked + .day-pill {
            background-color: #e6f4ea;
            border-color: #a3cfbb;
            color: var(--primary-color);
            font-weight: 600;
            box-shadow: 0 2px 4px rgba(45, 90, 39, 0.1);
        }

        /* שינוי קטן במעבר עכבר למחשבים */
        .day-label:hover .day-pill {
            border-color: #cbd5e1;
            background-color: #f1f5f9;
        }
        .day-label input:checked:hover + .day-pill {
            background-color: #d1ebd9;
        }

        /* כפתור שמירה צף בתחתית המסך למובייל או קבוע */
        .save-btn-container {
            margin-top: 40px;
            position: sticky;
            bottom: 20px;
            z-index: 10;
        }

        .save-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px; /* כפתור קפסולה צף מודרני */
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(45, 90, 39, 0.3);
            transition: all 0.2s ease;
        }

        .save-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(45, 90, 39, 0.4);
        }

        .save-btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* אנימציית טעינה */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>🏡 מתי עובדים מהבית?</h1>
    <div class="subtitle">לחצו על הימים שבהם אתם בבית ושמרו</div>

    <div id="loading" class="loading-container">
        <div class="spinner"></div>
        <div style="color: var(--text-muted); font-weight: 500;">טוען את חברי הצוות...</div>
    </div>

    <div class="grid-container" id="cards-container" style="display: none"></div>

    <div class="save-btn-container">
        <button class="save-btn" id="save-btn" style="display: none" onclick="saveData()">
            שמור שינויים
        </button>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbx71dQBWIJyZ238V2TMIRYCAwjqFMQTCvl8iwIpr0--4w4pi8ibYrlTSadugkf7fKvC/exec";
        const daysNames = ["א'", "ב'", "ג'", "ד'", "ה'"];

        async function loadCards() {
            try {
                const response = await fetch(scriptUrl);
                const data = await response.json();
                const container = document.getElementById("cards-container");
                container.innerHTML = "";

                data.forEach((user) => {
                    // יצירת כרטיסייה לכל עובד
                    const card = document.createElement("div");
                    card.className = "user-card";

                    const nameDiv = document.createElement("div");
                    nameDiv.className = "user-name";
                    nameDiv.textContent = user.name;
                    card.appendChild(nameDiv);

                    const daysGroup = document.createElement("div");
                    daysGroup.className = "days-group";

                    // יצירת 5 כפתורים פנימיים לכל יום
                    for (let i = 0; i < 5; i++) {
                        const label = document.createElement("label");
                        label.className = "day-label";

                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.dataset.user = user.name;
                        checkbox.dataset.day = i;
                        checkbox.checked = user.days[i] === true || user.days[i] === "TRUE";

                        const pill = document.createElement("span");
                        pill.className = "day-pill";
                        pill.textContent = daysNames[i];

                        label.appendChild(checkbox);
                        label.appendChild(pill);
                        daysGroup.appendChild(label);
                    }

                    card.appendChild(daysGroup);
                    container.appendChild(card);
                });

                document.getElementById("loading").style.style.display = "none"; // תיקון שגיאת כתיב קטנה שהייתה בקוד הקודם
                document.getElementById("loading").style.display = "none";
                container.style.display = "grid";
                document.getElementById("save-btn").style.display = "block";
            } catch (e) {
                document.getElementById("loading").innerHTML = "<div style='color:#ef4444;'>שגיאה בטעינת הנתונים.</div>";
                console.error(e);
            }
        }

        async function saveData() {
            const btn = document.getElementById("save-btn");
            btn.textContent = "שומר...";
            btn.disabled = true;

            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const payload = {};

            checkboxes.forEach((cb) => {
                const user = cb.dataset.user;
                const dayIndex = parseInt(cb.dataset.day);
                if (!payload[user])
                    payload[user] = [false, false, false, false, false];
                payload[user][dayIndex] = cb.checked;
            });

            try {
                await fetch(scriptUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                alert("השינויים נשמרו בהצלחה!");
            } catch (e) {
                alert("שגיאה בשמירת הנתונים");
                console.error(e);
            } finally {
                btn.textContent = "שמור שינויים";
                btn.disabled = false;
            }
        }

        loadCards();
    </script>
</body>
</html>
