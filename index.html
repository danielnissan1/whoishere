<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>נוכחות</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --border-color: #e2e8f0;
            --off-state: #e2e8f0;
            --on-state: #2563eb;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 900px;
        }

        .user-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .user-name {
            font-size: 1rem;
            font-weight: 600;
        }

        .days-row {
            display: flex;
            gap: 8px;
        }

        .day-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .day-header {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .clickable-label {
            cursor: pointer;
            width: 100%;
        }

        .clickable-label input {
            display: none;
        }

        /* הריבוע הבינארי הנקי */
        .binary-square {
            height: 36px;
            background-color: var(--off-state);
            border-radius: 6px;
            transition: background-color 0.1s ease;
        }

        /* מצב מסומן */
        .clickable-label input:checked + .binary-square {
            background-color: var(--on-state);
        }

        /* כפתור שמירה קומפקטי */
        .save-container {
            margin-top: 30px;
        }

        .save-btn {
            background-color: #0f172a;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        .save-btn:disabled {
            background-color: #94a3b8;
        }

        /* טעינה */
        .loading-container {
            margin: 40px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top: 2px solid var(--on-state);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>מצב נוכחות צוות</h1>

    <div id="loading" class="loading-container">
        <div class="spinner"></div>
    </div>

    <div class="grid-container" id="cards-container" style="display: none"></div>

    <div class="save-container">
        <button class="save-btn" id="save-btn" style="display: none" onclick="saveData()">
            שמור שינויים
        </button>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbx71dQBWIJyZ238V2TMIRYCAwjqFMQTCvl8iwIpr0--4w4pi8ibYrlTSadugkf7fKvC/exec";
        const daysNames = ["א'", "ב'", "ג'", "ד'", "ה'"];

        async function loadCards() {
            try {
                const response = await fetch(scriptUrl);
                const data = await response.json();
                const container = document.getElementById("cards-container");
                container.innerHTML = "";

                data.forEach((user) => {
                    const card = document.createElement("div");
                    card.className = "user-card";

                    const nameDiv = document.createElement("div");
                    nameDiv.className = "user-name";
                    nameDiv.textContent = user.name;
                    card.appendChild(nameDiv);

                    const daysRow = document.createElement("div");
                    daysRow.className = "days-row";

                    for (let i = 0; i < 5; i++) {
                        const dayBox = document.createElement("div");
                        dayBox.className = "day-box";

                        const dayHeader = document.createElement("div");
                        dayHeader.className = "day-header";
                        dayHeader.textContent = daysNames[i];
                        dayBox.appendChild(dayHeader);

                        const label = document.createElement("label");
                        label.className = "clickable-label";

                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.dataset.user = user.name;
                        checkbox.dataset.day = i;
                        checkbox.checked = user.days[i] === true || user.days[i] === "TRUE";

                        const square = document.createElement("div");
                        square.className = "binary-square";
                        
                        label.appendChild(checkbox);
                        label.appendChild(square);
                        dayBox.appendChild(label);
                        daysRow.appendChild(dayBox);
                    }

                    card.appendChild(daysRow);
                    container.appendChild(card);
                });

                document.getElementById("loading").style.display = "none";
                container.style.display = "grid";
                document.getElementById("save-btn").style.display = "block";
            } catch (e) {
                document.getElementById("loading").innerHTML = "שגיאה בטעינה";
                console.error(e);
            }
        }

        async function saveData() {
            const btn = document.getElementById("save-btn");
            btn.textContent = "שומר...";
            btn.disabled = true;

            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const payload = {};

            checkboxes.forEach((cb) => {
                const user = cb.dataset.user;
                const dayIndex = parseInt(cb.dataset.day);
                if (!payload[user])
                    payload[user] = [false, false, false, false, false];
                payload[user][dayIndex] = cb.checked;
            });

            try {
                await fetch(scriptUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                alert("נשמר!");
            } catch (e) {
                alert("שגיאה");
                console.error(e);
            } finally {
                btn.textContent = "שמור שינויים";
                btn.disabled = false;
            }
        }

        loadCards();
    </script>
</body>
</html>
