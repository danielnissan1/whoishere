<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מצב נוכחות צוות</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            /* מצבי כפתורים */
            --office-bg: #f1f5f9;
            --office-text: #475569;
            --home-bg: #2563eb;
            --home-text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 4px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
            text-align: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 1000px;
        }

        .user-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .days-container {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }

        .day-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 0; /* מונע קריסה של הכפתורים במובייל */
        }

        .day-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            white-space: nowrap;
        }

        .day-label {
            cursor: pointer;
            width: 100%;
        }

        .day-label input {
            display: none;
        }

        /* כפתור הסטטוס */
        .status-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 2px;
            background-color: var(--office-bg);
            color: var(--office-text);
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.15s ease;
            user-select: none;
            white-space: nowrap;
        }

        /* ברירת מחדל - משרד */
        .status-btn::before {
            content: "משרד";
        }

        /* כשהצ'קבוקס מופעל - הופך לבית */
        .day-label input:checked + .status-btn {
            background-color: var(--home-bg);
            color: var(--home-text);
            font-weight: 600;
        }

        .day-label input:checked + .status-btn::before {
            content: "בית";
        }

        /* כפתור שמירה צף */
        .save-container {
            margin-top: 35px;
            position: sticky;
            bottom: 15px;
            z-index: 10;
        }

        .save-btn {
            background-color: #1e293b;
            color: white;
            border: none;
            padding: 14px 50px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .save-btn:hover {
            background-color: #0f172a;
        }

        .save-btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* טעינה */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>עדכון מיקום צוות</h1>
    <div class="subtitle">קליק על היום כדי לשנות בין משרד לבית, ובסיום לחצו שמירה</div>

    <div id="loading" class="loading-container">
        <div class="spinner"></div>
    </div>

    <div class="grid-container" id="cards-container" style="display: none"></div>

    <div class="save-container">
        <button class="save-btn" id="save-btn" style="display: none" onclick="saveData()">
            שמור שינויים
        </button>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbx71dQBWIJyZ238V2TMIRYCAwjqFMQTCvl8iwIpr0--4w4pi8ibYrlTSadugkf7fKvC/exec";
        const daysNames = ["ראשון", "שני", "שלישי", "רביעי", "חמישי"];

        async function loadCards() {
            try {
                const response = await fetch(scriptUrl);
                const data = await response.json();
                const container = document.getElementById("cards-container");
                container.innerHTML = "";

                data.forEach((user) => {
                    const card = document.createElement("div");
                    card.className = "user-card";

                    const nameDiv = document.createElement("div");
                    nameDiv.className = "user-name";
                    nameDiv.textContent = user.name;
                    card.appendChild(nameDiv);

                    const daysContainer = document.createElement("div");
                    daysContainer.className = "days-container";

                    for (let i = 0; i < 5; i++) {
                        const dayWrapper = document.createElement("div");
                        dayWrapper.className = "day-wrapper";

                        const dayName = document.createElement("div");
                        dayName.className = "day-name";
                        dayName.textContent = daysNames[i];
                        dayWrapper.appendChild(dayName);

                        const label = document.createElement("label");
                        label.className = "day-label";

                        const checkbox = document.createElement("input");
                        checkbox.type = "checkbox";
                        checkbox.dataset.user = user.name;
                        checkbox.dataset.day = i;
                        checkbox.checked = user.days[i] === true || user.days[i] === "TRUE";

                        const statusBtn = document.createElement("div");
                        statusBtn.className = "status-btn";
                        
                        label.appendChild(checkbox);
                        label.appendChild(statusBtn);
                        dayWrapper.appendChild(label);
                        daysContainer.appendChild(dayWrapper);
                    }

                    card.appendChild(daysContainer);
                    container.appendChild(card);
                });

                document.getElementById("loading").style.display = "none";
                container.style.display = "grid";
                document.getElementById("save-btn").style.display = "block";
            } catch (e) {
                document.getElementById("loading").innerHTML = "<div style='color:#ef4444; font-weight:600;'>שגיאה בטעינת הנתונים</div>";
                console.error(e);
            }
        }

        async function saveData() {
            const btn = document.getElementById("save-btn");
            btn.textContent = "שומר...";
            btn.disabled = true;

            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const payload = {};

            checkboxes.forEach((cb) => {
                const user = cb.dataset.user;
                const dayIndex = parseInt(cb.dataset.day);
                if (!payload[user])
                    payload[user] = [false, false, false, false, false];
                payload[user][dayIndex] = cb.checked;
            });

            try {
                await fetch(scriptUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                alert("העדכון נשמר בהצלחה!");
            } catch (e) {
                alert("שגיאה בשמירת הנתונים");
                console.error(e);
            } finally {
                btn.textContent = "שמור שינויים";
                btn.disabled = false;
            }
        }

        loadCards();
    </script>
</body>
</html>
